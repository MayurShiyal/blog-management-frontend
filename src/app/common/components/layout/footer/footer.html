<footer class="visitor-footer bg-white border-top border-light-subtle mt-auto">
  <div class="container-xl px-3 px-md-4 py-5">
    <div class="row g-4 align-items-start">
      <div class="col-12 col-lg-4">
        <div class="d-flex align-items-center gap-2 mb-3">
          <div
            class="visitor-brand-mark d-flex align-items-center justify-content-center fw-bold text-white rounded-2"
          >
            <i class="bi bi-pen-fill"></i>
          </div>
          <span class="fw-bold text-dark fs-5">BlogSpace</span>
        </div>
        <p class="text-secondary small mb-0 lh-base" style="max-width: 320px">
          A platform for curious minds. Discover stories, ideas, and perspectives from writers
          around the world.
        </p>
      </div>

      <div class="col-6 col-sm-4 col-lg-2 offset-lg-2">
        <h6 class="fw-bold text-dark mb-3 small text-uppercase tracking-wide">Explore</h6>
        <ul class="list-unstyled mb-0 d-flex flex-column gap-25">
          <li>
            <a
              [routerLink]="routes.PUBLIC.BLOGS.ABSOLUTE"
              class="text-secondary text-decoration-none small visitor-footer-link d-inline-flex align-items-center"
            >
              All Articles
            </a>
          </li>
        </ul>
      </div>

      <div class="col-6 col-sm-4 col-lg-2">
        <h6 class="fw-bold text-dark mb-3 small text-uppercase tracking-wide">Account</h6>
        <ul class="list-unstyled mb-0 d-flex flex-column gap-25">
          @if (!isLoggedIn()) {
          <li>
            <a
              [routerLink]="routes.AUTH.LOGIN.ABSOLUTE"
              class="text-secondary text-decoration-none small visitor-footer-link d-inline-flex align-items-center"
            >
              Sign In
            </a>
          </li>
          <li>
            <a
              [routerLink]="routes.AUTH.REGISTER.ABSOLUTE"
              class="text-secondary text-decoration-none small visitor-footer-link d-inline-flex align-items-center"
            >
              Register
            </a>
          </li>
          } @else {
          <li>
            <button
              class="btn p-0 border-0 text-secondary small visitor-footer-link d-inline-flex align-items-center text-start shadow-none"
              (click)="logout()"
            >
              Sign Out
            </button>
          </li>
          }
        </ul>
      </div>
    </div>

    <hr class="border-light-subtle my-4" />

    <div
      class="d-flex flex-column flex-sm-row align-items-center justify-content-between gap-3 text-center text-sm-start"
    >
      <p class="text-secondary small mb-0">
        &copy; {{ currentYear }} BlogSpace. All rights reserved.
      </p>
      <p class="text-secondary small mb-0 d-flex align-items-center gap-1">
        Built with <i class="bi bi-heart-fill text-danger" style="font-size: 0.75rem"></i> for
        writers
      </p>
    </div>
  </div>
</footer>
