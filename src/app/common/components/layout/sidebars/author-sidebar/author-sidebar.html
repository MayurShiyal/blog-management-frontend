<aside class="sidebar" [class.sidebar--open]="isOpen()">
  <div class="sidebar__header">
    <div class="brand-mark">B</div>
    <span class="brand-name">Blog Platform</span>
    <button
      class="sidebar__close d-lg-none"
      (click)="closeSidebar.emit()"
      aria-label="Close sidebar"
    >
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <nav class="sidebar__nav">
    <a
      class="sidebar__link"
      [routerLink]="routes.DASHBOARD.HOME.ABSOLUTE"
      routerLinkActive="sidebar__link--active"
    >
      <i class="bi bi-house"></i>
      <span>Home</span>
    </a>
    <a
      class="sidebar__link"
      [routerLink]="routes.BLOG.LIST.ABSOLUTE"
      routerLinkActive="sidebar__link--active"
    >
      <i class="bi bi-file-earmark-richtext"></i>
      <span>My Blogs</span>
    </a>
    <a
      class="sidebar__link"
      [routerLink]="routes.BLOG.CREATE.ABSOLUTE"
      routerLinkActive="sidebar__link--active"
    >
      <i class="bi bi-plus-circle"></i>
      <span>New Blog</span>
    </a>
  </nav>

  <div class="sidebar__footer">
    @if (user()) {
    <div class="sidebar__user">
      <div class="user-avatar">{{ user()?.firstName?.charAt(0) | uppercase }}</div>
      <div class="user-info">
        <div class="user-name">{{ user()?.firstName }}</div>
        <div class="user-role">{{ user()?.role }}</div>
      </div>
    </div>
    }
    <button class="btn btn-outline-secondary btn-sm w-100 mt-2" (click)="logoutClicked.emit()">
      <i class="bi bi-box-arrow-right me-1"></i> Logout
    </button>
  </div>
</aside>
