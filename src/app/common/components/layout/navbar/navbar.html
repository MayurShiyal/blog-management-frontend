<nav
  class="visitor-navbar navbar navbar-expand-lg bg-white border-bottom border-light-subtle shadow-sm sticky-top"
>
  <div class="container-xl px-3 px-md-4">
    <a
      class="navbar-brand d-flex align-items-center gap-2 text-decoration-none me-3"
      [routerLink]="routes.PUBLIC.BLOGS.ABSOLUTE"
    >
      <div
        class="visitor-brand-mark d-flex align-items-center justify-content-center fw-bold text-white rounded-2"
      >
        <i class="bi bi-pen-fill"></i>
      </div>
      <span class="visitor-brand-name fw-bold text-dark">BlogSpace</span>
    </a>

    <div class="d-flex align-items-center gap-2 ms-auto">
      @if (isLoggedIn()) {
      <div class="navbar-profile-wrap position-relative">
        <button
          class="btn d-flex align-items-center gap-2 p-0 border-0 bg-transparent"
          (click)="toggleProfileMenu()"
          type="button"
        >
          <span class="text-dark fw-medium small d-none d-sm-inline-block">
            {{ getUserDisplayName() }}
          </span>
          <div
            class="visitor-avatar d-flex align-items-center justify-content-center fw-bold text-white rounded-circle"
          >
            {{ getUserInitial() }}
          </div>
        </button>

        @if (profileMenuOpen()) {
        <div
          class="visitor-profile-dropdown position-absolute end-0 bg-white rounded-3 shadow-lg border border-light-subtle"
        >
          <div class="px-3 py-2 border-bottom border-light-subtle">
            <div class="fw-semibold text-dark small">{{ getUserDisplayName() }}</div>
            <div class="text-muted" style="font-size: 0.72rem">{{ currentUser()?.email }}</div>
          </div>
          <div class="p-1">
            @if (currentUser()?.role === 'Admin' || currentUser()?.role === 'Author') {
            <a
              class="dropdown-item rounded-2 small py-2"
              [routerLink]="routes.DASHBOARD.HOME.ABSOLUTE"
              (click)="profileMenuOpen.set(false)"
            >
              <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
            }
            <a
              class="dropdown-item rounded-2 small py-2"
              [routerLink]="'/profile'"
              (click)="profileMenuOpen.set(false)"
            >
              <i class="bi bi-person me-2"></i>My Profile
            </a>
            <button
              class="dropdown-item rounded-2 small py-2 text-danger w-100 text-start border-0 bg-transparent"
              (click)="logout()"
            >
              <i class="bi bi-box-arrow-right me-2"></i>Sign Out
            </button>
          </div>
        </div>
        }
      </div>
      } @else {
      <a class="btn btn-ghost-sm visitor-nav-link" [routerLink]="routes.AUTH.LOGIN.ABSOLUTE"
        >Sign In</a
      >
      <a
        class="btn btn-primary btn-sm rounded-pill px-3"
        [routerLink]="routes.AUTH.REGISTER.ABSOLUTE"
        >Get Started</a
      >
      }
    </div>
  </div>
</nav>
