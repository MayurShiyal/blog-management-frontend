<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center px-3">
  <div
    class="empty-state-icon-wrap mb-3 d-flex align-items-center justify-content-center"
    [style.color]="iconColor"
  >
    <i class="bi" [class]="icon" [style.font-size.rem]="iconSize"></i>
  </div>

  <h3 class="fw-bold fs-5 text-dark mb-2">
    {{ title }}
  </h3>

  <p class="text-muted small mb-0 max-width-320">
    {{ message }}
  </p>
</div>
