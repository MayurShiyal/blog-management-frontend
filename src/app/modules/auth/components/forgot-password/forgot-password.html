<div class="d-flex d-lg-none align-items-center gap-2 mb-4">
  <div
    class="auth-brand-mark d-flex align-items-center justify-content-center fw-bold fs-5 text-white"
  >
    B
  </div>
  <span class="mobile-brand-title fw-semibold fs-6"> Blog Management </span>
</div>

<div class="mb-3 text-center">
  <div
    class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary bg-opacity-10"
    style="width: 64px; height: 64px"
  >
    <i class="bi bi-key fs-3 text-primary"></i>
  </div>
</div>

<h2 class="signin-title mb-1 text-center fw-bold">Forgot Password?</h2>
<p class="text-muted small mb-4 text-center">
  No worries — enter your email and we'll send a reset link.
</p>

@if (serverMsg()) {
<div
  class="alert alert-{{ serverMsg()!.type }} d-flex align-items-center gap-2 mb-4 animate-fade-in"
  role="alert"
>
  <i
    class="bi {{
      serverMsg()!.type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill'
    }}"
  ></i>
  <span>{{ serverMsg()!.text }}</span>
</div>
} @if (!submitted()) {
<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <app-email
    [control]="form.controls.email"
    label="Email Address"
    placeholder="your@email.com"
  ></app-email>

  <button
    type="submit"
    class="btn btn-primary w-100 py-2 mb-4 fw-semibold shadow-sm"
    [disabled]="loading()"
  >
    @if (loading()) {
    <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
    Sending… } @else { Send Reset Link }
  </button>

  <p class="text-center mb-0 text-muted small">
    Remembered your password?
    <a
      [routerLink]="routes.AUTH.LOGIN.ABSOLUTE"
      class="fw-semibold text-decoration-none text-primary"
    >
      Sign in
    </a>
  </p>
</form>
} @else {
<div class="text-center">
  <p class="text-muted small mb-4">
    Didn't receive the email? Check your spam folder or
    <button
      type="button"
      class="btn btn-link p-0 fw-semibold text-primary text-decoration-none small"
      (click)="submitted.set(false); serverMsg.set(null)"
    >
      try again</button
    >.
  </p>
  <a
    [routerLink]="routes.AUTH.LOGIN.ABSOLUTE"
    class="btn btn-outline-primary w-100 py-2 fw-semibold"
  >
    Back to Sign In
  </a>
</div>
}
