<div class="d-flex d-lg-none align-items-center gap-2 mb-4">
  <div
    class="auth-brand-mark d-flex align-items-center justify-content-center fw-bold fs-5 text-white"
  >
    B
  </div>
  <span class="mobile-brand-title fw-semibold fs-6"> Blog Management </span>
</div>

<h2 class="form-title mb-1 fw-bold">Create account</h2>
<p class="text-muted small mb-4">Fill in your details to get started</p>

@if (serverMsg()) {
<div
  class="alert alert-{{ serverMsg()!.type }} d-flex align-items-center gap-2 mb-4 animate-fade-in"
  role="alert"
>
  <i
    class="bi {{
      serverMsg()!.type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill'
    }}"
  ></i>
  <span>{{ serverMsg()!.text }}</span>
</div>
}

<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="row g-3 mb-3">
    <div class="col-6">
      <app-input
        [control]="form.controls.firstName"
        label="First Name"
        placeholder="John"
        autocomplete="given-name"
      ></app-input>
    </div>

    <div class="col-6">
      <app-input
        [control]="form.controls.lastName"
        label="Last Name"
        placeholder="Doe"
        autocomplete="family-name"
      ></app-input>
    </div>
  </div>

  <app-email
    [control]="form.controls.email"
    label="Email Address"
    placeholder="john@example.com"
  ></app-email>

  <app-password
    [control]="form.controls.password"
    label="Password"
    placeholder="Min 8 chars, upper, lower, number, symbol"
  ></app-password>

  <div class="mb-4">
    <label class="form-label" for="role"> Role <span class="text-danger">*</span> </label>
    <select
      id="role"
      class="form-select rounded-3"
      [class.is-invalid]="form.controls.role.invalid && form.controls.role.touched"
      formControlName="role"
    >
      <option [ngValue]="null" disabled selected>Select your role…</option>
      @for (r of roles; track r.value) {
      <option [value]="r.value">{{ r.label }}</option>
      }
    </select>

    @if (form.controls.role.invalid && form.controls.role.touched) {
    <div class="invalid-feedback">Please select a role.</div>
    }
  </div>

  <button
    type="submit"
    class="btn btn-primary w-100 py-2 mb-3 fw-semibold shadow-sm"
    [disabled]="loading()"
  >
    @if (loading()) {
    <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
    Creating account… } @else { Create Account }
  </button>

  <p class="text-center mb-0 text-muted small">
    Already have an account?
    <a
      [routerLink]="routes.AUTH.LOGIN.ABSOLUTE"
      class="fw-semibold text-decoration-none text-primary"
    >
      Login
    </a>
  </p>
</form>
